version: '3.8'

services:
    # PostgreSQL Database
    postgres:
        image: postgres:16
        container_name: cpgagent-postgres
        environment:
            POSTGRES_DB: cpgagent
            POSTGRES_USER: cpgagent
            POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U cpgagent"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - cpgagent-network

    # Redis Cache
    redis:
        image: redis:7-alpine
        container_name: cpgagent-redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            - cpgagent-network

    # FastAPI Backend
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: cpgagent-backend
        environment:
            - DATABASE_URL=postgresql://cpgagent:${DB_PASSWORD:-changeme}@postgres:5432/cpgagent
            - REDIS_URL=redis://redis:6379/0
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            - ENVIRONMENT=production
            - DEBUG=False
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - ./backend:/app
            - backend_logs:/app/logs
        command: uvicorn main:app --host 0.0.0.0 --port 8000
        networks:
            - cpgagent-network

    # Celery Worker for Background Tasks
    celery-worker:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: cpgagent-celery
        environment:
            - DATABASE_URL=postgresql://cpgagent:${DB_PASSWORD:-changeme}@postgres:5432/cpgagent
            - REDIS_URL=redis://redis:6379/0
            - CELERY_BROKER_URL=redis://redis:6379/0
            - CELERY_RESULT_BACKEND=redis://redis:6379/0
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
        depends_on:
            - redis
            - postgres
        volumes:
            - ./backend:/app
        command: celery -A core.celery_app worker --loglevel=info
        networks:
            - cpgagent-network

    # Next.js Frontend
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: cpgagent-frontend
        environment:
            - NEXT_PUBLIC_API_URL=http://localhost:8000
            - NEXT_PUBLIC_WS_URL=ws://localhost:8000
        ports:
            - "3000:3000"
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - /app/.next
        networks:
            - cpgagent-network

    # Nginx Reverse Proxy (Production)
    nginx:
        image: nginx:alpine
        container_name: cpgagent-nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/ssl:/etc/nginx/ssl:ro
        depends_on:
            - frontend
            - backend
        networks:
            - cpgagent-network

volumes:
    postgres_data:
    redis_data:
    backend_logs:

networks:
    cpgagent-network:
        driver: bridge
