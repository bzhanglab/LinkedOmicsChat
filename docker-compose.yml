services:
    # PostgreSQL Database
    postgres:
        image: postgres:16
        container_name: linkedomicsai-postgres
        environment:
            POSTGRES_DB: linkedomicsai
            POSTGRES_USER: linkedomicsai
            POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U linkedomicsai"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - linkedomicsai-network

    # Redis Cache
    redis:
        image: redis:7-alpine
        container_name: linkedomicsai-redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            - linkedomicsai-network

    # Ollama (Local LLM)
    ollama:
        image: ollama/ollama:latest
        container_name: linkedomicsai-ollama
        ports:
            - "11434:11434"
        volumes:
            - ollama_data:/root/.ollama
        environment:
            - OLLAMA_HOST=0.0.0.0
        networks:
            - linkedomicsai-network
        # Note: First run will download the model, which can take time
        # Run: docker-compose exec ollama ollama pull llama3

    # FastAPI Backend
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: linkedomicsai-backend
        env_file:
            - .env
        environment:
            - DATABASE_URL=postgresql://linkedomicsai:${DB_PASSWORD:-changeme}@postgres:5432/linkedomicsai
            - REDIS_URL=redis://redis:6379/0
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            - USE_OLLAMA=${USE_OLLAMA:-false}
            - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
            - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
            - MOCK_LLM=${MOCK_LLM:-false}
            - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
            - ENVIRONMENT=production
            - DEBUG=False
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            ollama:
                condition: service_started
        volumes:
            - ./backend:/app
            - backend_logs:/app/logs
        command: uvicorn main:app --host 0.0.0.0 --port 8000
        networks:
            - linkedomicsai-network

    # Celery Worker for Background Tasks (disabled - not currently used)
    # celery-worker:
    #     build:
    #         context: ./backend
    #         dockerfile: Dockerfile
    #     container_name: linkedomicsai-celery
    #     environment:
    #         - DATABASE_URL=postgresql://linkedomicsai:${DB_PASSWORD:-changeme}@postgres:5432/linkedomicsai
    #         - REDIS_URL=redis://redis:6379/0
    #         - CELERY_BROKER_URL=redis://redis:6379/0
    #         - CELERY_RESULT_BACKEND=redis://redis:6379/0
    #         - OPENAI_API_KEY=${OPENAI_API_KEY}
    #         - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    #         - USE_OLLAMA=${USE_OLLAMA:-false}
    #         - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    #         - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    #         - MOCK_LLM=${MOCK_LLM:-false}
    #     depends_on:
    #         - redis
    #         - postgres
    #         - ollama
    #     volumes:
    #         - ./backend:/app
    #     command: celery -A core.celery_app worker --loglevel=info
    #     networks:
    #         - linkedomicsai-network

    # Next.js Frontend
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
                - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
        container_name: linkedomicsai-frontend
        environment:
            - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
            - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
        ports:
            - "3000:3000"
        depends_on:
            - backend
        networks:
            - linkedomicsai-network

    # Nginx Reverse Proxy (Production) - Disabled (Apache using port 443)
    # nginx:
    #     image: nginx:alpine
    #     container_name: linkedomicsai-nginx
    #     ports:
    #         - "80:80"
    #         - "443:443"
    #     volumes:
    #         - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    #         - ./nginx/ssl:/etc/nginx/ssl:ro
    #     depends_on:
    #         - frontend
    #         - backend
    #     networks:
    #         - linkedomicsai-network

volumes:
    postgres_data:
    redis_data:
    backend_logs:
    ollama_data:

networks:
    linkedomicsai-network:
        driver: bridge
